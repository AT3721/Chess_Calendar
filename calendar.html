<!DOCTYPE html>
<html lang="vi">

<head>

    <title>Lịch tháng 10/2009</title>

            text-align: center;
            font-size: 25px;
            margin: 20px auto;
        }

        h2 {
            color: blue;
            margin-top: 30px;
        }

        td,

            width: 100px;
            height: 50px;
            vertical-align: middle;
            text-align: center;
        }

        table {
            margin: auto;
            border-collapse: collapse;
        }

        td {
            border: 2px solid #ccc;
        }

        td:first-child {

        }

        td:last-child {
            color: blue;
        }

        sub {
            font-size: 10px;
            color: #666;
            margin-left: 2px;
        }
    </style>
</head>
